<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; padding: 0; background: #090D1A; }
</style>
</head>
<body>
<div style="position:relative; width:1284px; height:2778px; overflow:hidden;">

  <!-- Background Image -->
  <img src="https://r2-pub.rork.com/app-store-screenshots/8d488449-a497-4ef6-a6a9-f5c61b960d80.png" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; display:block;" draggable="false" />

  <!-- Dark overlay to boost contrast in headline area -->
  <div style="position:absolute; top:0; left:0; width:100%; height:30%; background: linear-gradient(to bottom, rgba(5,8,20,0.72) 0%, rgba(5,8,20,0.45) 70%, rgba(5,8,20,0) 100%);"></div>

  <!-- Headline -->
  <div style="position:absolute; top:0; left:50%; width:80%; height:26%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; text-align:center;">
    <h1 style="font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 140px; line-height: 1.0; color: #FFFFFF; text-transform: uppercase; letter-spacing: -1px; text-shadow: 0 0 40px rgba(255,98,0,0.7), 0 4px 32px rgba(0,0,0,0.9), 0 2px 8px rgba(0,0,0,1);">Every Drill<br>You Need</h1>
  </div>

  <!-- Device Mockup -->
  <div style="position:absolute; left:50%; bottom:0; width:86%; transform:translateX(-50%) translateY(6%);">
    <div style="position:relative; aspect-ratio:879/1832;">
      <div style="position:absolute; overflow:hidden; left:4.32%; top:2.29%; width:91.47%; height:95.41%; border-radius:7.5% / 3.5%;">
        <img src="https://r2-pub.rork.com/app-store-screenshots/f391a9e3-1733-42de-b60f-4f3e94243870.png" style="display:block; width:100%; height:100%; object-fit:cover; object-position:top;" draggable="false" />
      </div>
      <img src="https://r2-pub.rork.com/static/iphone-mockups/iphone-17-pro-cosmic-orange.png" style="position:relative; z-index:10; display:block; width:100%; height:100%; pointer-events:none;" draggable="false" />
    </div>
  </div>

</div>
</body>
</html>
