<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; padding: 0; background: #000; }
</style>
</head>
<body>
<div style="position:relative; width:1284px; height:2778px; overflow:hidden;">

  <!-- Background Layer -->
  <img src="https://r2-pub.rork.com/app-store-screenshots/d211f3d2-d70e-4947-a95b-0674b3bfd123.png"
    style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; object-position:center; z-index:0;" draggable="false" />

  <!-- Subtle dark scrim over headline area for contrast -->
  <div style="position:absolute; top:0; left:0; width:100%; height:30%; background:linear-gradient(to bottom, rgba(5,8,20,0.72) 0%, rgba(5,8,20,0.45) 70%, rgba(5,8,20,0) 100%); z-index:1;"></div>

  <!-- Headline -->
  <div style="position:absolute; top:0; left:50%; width:80%; height:26%; transform:translateX(-50%); display:flex; align-items:center; justify-content:center; text-align:center; z-index:2;">
    <h1 style="font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:140px; line-height:1.0; color:#FFFFFF; text-transform:uppercase; letter-spacing:2px; text-shadow: 0 0 40px rgba(255,98,0,0.55), 0 4px 32px rgba(0,0,0,0.85), 0 2px 8px rgba(0,0,0,0.95);">Your Daily<br>AI Plan</h1>
  </div>

  <!-- Device Mockup -->
  <div style="position:absolute; left:50%; bottom:0; width:86%; transform:translateX(-50%) translateY(6%); z-index:3;">
    <div style="position:relative; aspect-ratio:879/1832;">
      <div style="position:absolute; overflow:hidden; left:4.32%; top:2.29%; width:91.47%; height:95.41%; border-radius:7.5% / 3.5%;">
        <img src="https://r2-pub.rork.com/app-store-screenshots/f9ed82be-13cd-4c69-8b70-d7e6ee6fcc29.png" style="display:block; width:100%; height:100%; object-fit:cover; object-position:top;" draggable="false" />
      </div>
      <img src="https://r2-pub.rork.com/static/iphone-mockups/iphone-17-pro-cosmic-orange.png" style="position:relative; z-index:10; display:block; width:100%; height:100%; pointer-events:none;" draggable="false" />
    </div>
  </div>

</div>
</body>
</html>
